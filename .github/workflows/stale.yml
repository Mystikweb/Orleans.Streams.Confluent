name: Stale Issue and PR Management

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - name: Mark and close stale issues/PRs
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 21
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,help wanted
          exempt-pr-labels: pinned,security
          stale-issue-message: >-
            This issue has been automatically marked as stale due to inactivity.
            If this is still relevant, please add an update (repro details, logs, or current status)
            and the stale label will be removed.
          close-issue-message: >-
            Closing this issue due to inactivity after being marked stale.
            If this is still relevant, please open a new issue and link this one with updated details.
          stale-pr-message: >-
            This pull request has been automatically marked as stale due to inactivity.
            Please push an update or leave a comment if it should remain open.
          close-pr-message: >-
            Closing this pull request due to inactivity after being marked stale.
            Reopen if work resumes.
          remove-stale-when-updated: true
          operations-per-run: 200
