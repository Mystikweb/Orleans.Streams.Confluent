name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Orleans.Streams.Confluent.slnx --nologo

      - name: Build
        run: dotnet build Orleans.Streams.Confluent.slnx --configuration Release --no-restore --nologo

      - name: Test (unit)
        run: dotnet test test/Orleans.Streams.Confluent.Tests/Orleans.Streams.Confluent.Tests.csproj --configuration Release --no-build --nologo

      - name: Test (integration)
        run: dotnet test test/Orleans.Streams.Confluent.IntegrationTests/Orleans.Streams.Confluent.IntegrationTests.csproj --configuration Release --no-build --nologo
